<idea>
**Design Movement:** Neo-Brutalism meets Industrial Tech
**Core Principles:**
- Raw, high-contrast typography with oversized numbers and labels
- Asymmetric card layouts with hard drop shadows and visible borders
- Bold use of black and electric yellow as primary palette

**Color Philosophy:** Black (#0A0A0A) base with electric yellow (#F5C518) accents — communicates urgency, precision, and confidence. White panels create breathing room.

**Layout Paradigm:** Offset grid with staggered cards; hero section splits diagonally between dark and light halves. Services laid out in a 3-column asymmetric masonry.

**Signature Elements:**
- Hard-shadow cards (no blur, solid offset shadow)
- Large bold step numbers for process sections
- Diagonal section dividers

**Interaction Philosophy:** Hover states snap rather than fade — borders thicken, shadows shift. Feels mechanical and deliberate.

**Animation:** Entrance animations use translate-Y with sharp easing (cubic-bezier 0.16, 1, 0.3, 1). No bouncy springs.

**Typography System:** "Space Grotesk" for headings (bold, geometric), "IBM Plex Mono" for labels/prices (technical feel), system sans for body.
</idea>
